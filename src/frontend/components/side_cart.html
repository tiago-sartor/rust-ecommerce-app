<div class="ml-4 flow-root lg:ml-6">
   <button
      on:click="move"
      |_|
      {
      set_open_side_cart.update(|is_open|
      *is_open="!*is_open);"
      }
      class="relative group -m-2 flex items-center p-2"
      type="button"
   >
      <svg
         class="size-6 shrink-0 text-gray-400 group-hover:text-gray-600"
         fill="none"
         viewBox="0 0 24 24"
         stroke-width="1.5"
         stroke="currentColor"
         aria-hidden="true"
         data-slot="icon"
      >
         <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"
         />
      </svg>
      <span
         class="flex items-center justify-center min-w-4.5 min-h-4.5 rounded-full text-xs font-medium text-white bg-stone-900 group-hover:bg-gray-800"
         >2</span
      >
      <span class="sr-only">itens no carrinho, ver carrinho</span>
   </button>

   <div
      class="overlay_class"
      aria-hidden="true"
      on:click="move"
      |_|
      set_open_side_cart.set(false)
   />

   <div class="drawer_class">
      <div class="flex-1 overflow-y-auto px-4 py-6 sm:px-6">
         <div class="flex items-start justify-between">
            <h2 class="text-lg font-medium text-gray-900" id="side-cart-title">Carrinho</h2>
            <div class="ml-3 flex h-7 items-center">
               <button
                  on:click="move"
                  |_|
                  set_open_side_cart.set(false)
                  type="button"
                  class="relative -m-2 p-2 text-gray-400 hover:text-gray-500"
               >
                  <span class="absolute -inset-0.5"></span>
                  <span class="sr-only">Fechar carrinho</span>
                  <svg
                     class="size-6.5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke-width="1.5"
                     stroke="currentColor"
                     aria-hidden="true"
                     data-slot="icon"
                  >
                     <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M6 18 18 6M6 6l12 12"
                     />
                  </svg>
               </button>
            </div>
         </div>
         <div class="mt-8">
            <ul role="list" class="-my-6 divide-y divide-gray-200">
               <li class="flex py-6">
                  <div class="size-24 shrink-0 overflow-hidden rounded-md border border-gray-200">
                     <img
                        src="https://tailwindcss.com/plus-assets/img/ecommerce-images/shopping-cart-page-04-product-01.jpg"
                        alt="Salmon orange fabric pouch with match zipper, gray zipper pull, and adjustable hip belt."
                        class="size-full object-cover"
                     />
                  </div>

                  <div class="ml-4 flex flex-1 flex-col">
                     <div>
                        <div class="flex justify-between text-base font-medium text-gray-900">
                           <h3>
                              <a href="#">Throwback Hip Bag</a>
                           </h3>
                           <p class="ml-4">R$ 90,00</p>
                        </div>
                        <p class="mt-1 text-sm text-gray-500">Salmon</p>
                     </div>
                     <div class="flex flex-1 items-end justify-between text-sm">
                        <p class="text-gray-500">Qtd 1</p>

                        <div class="flex">
                           <button
                              type="button"
                              class="font-medium text-gray-500 hover:text-bordeaux-500"
                           >
                              Remover
                           </button>
                        </div>
                     </div>
                  </div>
               </li>
               <li class="flex py-6">
                  <div class="size-24 shrink-0 overflow-hidden rounded-md border border-gray-200">
                     <img
                        src="https://tailwindcss.com/plus-assets/img/ecommerce-images/shopping-cart-page-04-product-02.jpg"
                        alt="Front of satchel with blue canvas body, black straps and handle, drawstring top, and front zipper pouch."
                        class="size-full object-cover"
                     />
                  </div>

                  <div class="ml-4 flex flex-1 flex-col">
                     <div>
                        <div class="flex justify-between text-base font-medium text-gray-900">
                           <h3>
                              <a href="#">Medium Stuff Satchel</a>
                           </h3>
                           <p class="ml-4">R$ 32,00</p>
                        </div>
                        <p class="mt-1 text-sm text-gray-500">Blue</p>
                     </div>
                     <div class="flex flex-1 items-end justify-between text-sm">
                        <p class="text-gray-500">Qtd 1</p>

                        <div class="flex">
                           <button
                              type="button"
                              class="font-medium text-gray-500 hover:text-bordeaux-500"
                           >
                              Remover
                           </button>
                        </div>
                     </div>
                  </div>
               </li>
            </ul>
         </div>
      </div>

      <div class="border-t border-gray-200 px-4 py-6 sm:px-6">
         <div class="flex justify-between text-base font-medium text-gray-900">
            <p>Subtotal</p>
            <p>R$ 262,00</p>
         </div>
         <p class="mt-0.5 text-sm text-gray-500">A entrega será calculada durante o checkout.</p>
         <div class="mt-6">
            <a
               href="#"
               class="flex items-center justify-center rounded-md border border-transparent bg-bordeaux-600 px-6 py-3 text-base font-medium text-white shadow-xs hover:bg-bordeaux-700"
               >Checkout</a
            >
         </div>
         <div class="mt-6 flex justify-center text-center text-sm text-gray-500">
            <p>
               ou
               <button
                  on:click="move"
                  |_|
                  set_open_side_cart.set(false)
                  type="button"
                  class="font-medium text-bordeaux-600 hover:text-bordeaux-500"
               >
                  Continuar comprando
                  <span aria-hidden="true"> &rarr;</span>
               </button>
            </p>
         </div>
      </div>
   </div>
</div>
